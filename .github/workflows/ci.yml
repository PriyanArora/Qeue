name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - identity-service
          - event-service
          - registration-service
          - gateway-service
          - notification-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Test ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: ./mvnw test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-client/package-lock.json
      - name: Install
        working-directory: web-client
        run: npm ci
      - name: Test
        working-directory: web-client
        run: npm test
      - name: Build
        working-directory: web-client
        run: npm run build

  images-and-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Build backend images
        run: |
          docker build -t qeue/identity-service:ci services/identity-service
          docker build -t qeue/event-service:ci services/event-service
          docker build -t qeue/registration-service:ci services/registration-service
          docker build -t qeue/gateway-service:ci services/gateway-service
          docker build -t qeue/notification-worker:ci services/notification-worker
      - name: Build frontend image
        run: docker build -t qeue/web-client:ci web-client
      - name: Validate Kubernetes manifests
        run: kubectl kustomize deploy/k8s/overlays/local > /tmp/qeue-k8s.yaml
      - name: Whitespace check
        run: git diff --check
