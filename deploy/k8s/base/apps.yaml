apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
    spec:
      containers:
        - name: identity-service
          image: qeue/identity-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
          env:
            - name: IDENTITY_SERVICE_PORT
              value: "4001"
            - name: IDENTITY_DB_URL
              valueFrom:
                configMapKeyRef:
                  name: qeue-config
                  key: IDENTITY_DB_URL
            - name: IDENTITY_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: qeue-secret
                  key: IDENTITY_DB_USERNAME
            - name: IDENTITY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: qeue-secret
                  key: IDENTITY_DB_PASSWORD
            - name: IDENTITY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: qeue-secret
                  key: IDENTITY_JWT_SECRET
            - name: IDENTITY_JWT_ISSUER
              valueFrom:
                configMapKeyRef:
                  name: qeue-config
                  key: IDENTITY_JWT_ISSUER
          readinessProbe:
            httpGet:
              path: /api/internal/health
              port: 4001
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/internal/health
              port: 4001
            initialDelaySeconds: 40
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
spec:
  selector:
    app: identity-service
  ports:
    - port: 4001
      targetPort: 4001
---
