openapi: 3.1.0
info:
  title: Qeue Registration API
  version: 1.0.0
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /api/events/{eventId}/registrations:
    post:
      operationId: registerForEvent
      parameters:
        - $ref: "#/components/parameters/EventId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationRequest"
            examples:
              withAnswers:
                value:
                  idempotencyKey: browser-submit-123
                  registrationTypeId: 11111111-1111-1111-1111-111111111111
                  answers:
                    - questionId: 22222222-2222-2222-2222-222222222222
                      answerText: Front row if available
      responses:
        "201":
          $ref: "#/components/responses/Registration"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/registrations/{registrationId}:
    delete:
      operationId: cancelRegistration
      parameters:
        - $ref: "#/components/parameters/RegistrationId"
      responses:
        "200":
          $ref: "#/components/responses/Registration"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/me/registrations:
    get:
      operationId: listMyRegistrations
      responses:
        "200":
          description: Current attendee registrations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Registration"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/me/registrations/{registrationId}/ticket:
    get:
      operationId: issueTicket
      parameters:
        - $ref: "#/components/parameters/RegistrationId"
      responses:
        "200":
          description: Fresh ticket code.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/organizer/events/{eventId}/registrations:
    get:
      operationId: listOrganizerRegistrations
      parameters:
        - $ref: "#/components/parameters/EventId"
        - name: status
          in: query
          schema:
            type: string
            enum: [CONFIRMED, CANCELLED]
        - name: registrationTypeId
          in: query
          schema:
            type: string
            format: uuid
        - name: query
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [createdAtAsc, createdAtDesc, emailAsc, emailDesc, statusAsc, statusDesc]
      responses:
        "200":
          description: Organizer attendee list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrganizerRegistration"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/organizer/events/{eventId}/registrations/{registrationId}:
    get:
      operationId: getOrganizerRegistration
      parameters:
        - $ref: "#/components/parameters/EventId"
        - $ref: "#/components/parameters/RegistrationId"
      responses:
        "200":
          description: Organizer registration detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizerRegistration"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/organizer/events/{eventId}/registrations/export.csv:
    get:
      operationId: exportOrganizerRegistrations
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: Registration CSV export.
          headers:
            Content-Disposition:
              schema:
                type: string
          content:
            text/csv:
              schema:
                type: string
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/organizer/events/{eventId}/check-in:
    post:
      operationId: checkIn
      parameters:
        - $ref: "#/components/parameters/EventId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInRequest"
            examples:
              ticket:
                value:
                  ticketCode: ABCD-1234
      responses:
        "200":
          description: Check-in result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckInResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/organizer/events/{eventId}/analytics:
    get:
      operationId: eventAnalytics
      parameters:
        - $ref: "#/components/parameters/EventId"
      responses:
        "200":
          description: Event analytics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Analytics"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/events/{eventId}/surveys/{surveyId}/responses:
    post:
      operationId: submitSurvey
      parameters:
        - $ref: "#/components/parameters/EventId"
        - $ref: "#/components/parameters/SurveyId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SurveySubmissionRequest"
      responses:
        "201":
          description: Survey submission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SurveySubmission"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
  /api/organizer/events/{eventId}/surveys/{surveyId}/responses:
    get:
      operationId: listSurveyResponses
      parameters:
        - $ref: "#/components/parameters/EventId"
        - $ref: "#/components/parameters/SurveyId"
      responses:
        "200":
          description: Survey responses.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SurveySubmission"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    EventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RegistrationId:
      name: registrationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SurveyId:
      name: surveyId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Registration:
      description: Registration.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Registration"
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Forbidden:
      description: Forbidden.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Conflict:
      description: Conflict.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
  schemas:
    RegistrationRequest:
      type: object
      required: [idempotencyKey]
      properties:
        idempotencyKey:
          type: string
        registrationTypeId:
          type: string
          format: uuid
          nullable: true
        answers:
          type: array
          items:
            $ref: "#/components/schemas/RegistrationAnswer"
    RegistrationAnswer:
      type: object
      required: [questionId, answerText]
      properties:
        questionId:
          type: string
          format: uuid
        answerText:
          type: string
    Registration:
      type: object
      required: [registrationId, eventId, eventTitle, startsAt, attendeeId, attendeeEmail, attendeeDisplayNameSnapshot, status, checkInStatus, createdAt, answers]
      properties:
        registrationId:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
        eventTitle:
          type: string
        startsAt:
          type: string
          format: date-time
        attendeeId:
          type: string
          format: uuid
        attendeeEmail:
          type: string
          format: email
        attendeeDisplayNameSnapshot:
          type: string
        registrationTypeId:
          type: string
          format: uuid
          nullable: true
        registrationTypeNameSnapshot:
          type: string
          nullable: true
        status:
          type: string
          enum: [CONFIRMED, CANCELLED]
        checkInStatus:
          type: string
          enum: [NOT_CHECKED_IN, CHECKED_IN]
        createdAt:
          type: string
          format: date-time
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        checkedInAt:
          type: string
          format: date-time
          nullable: true
        answers:
          type: array
          items:
            $ref: "#/components/schemas/RegistrationAnswer"
    OrganizerRegistration:
      allOf:
        - $ref: "#/components/schemas/Registration"
    Ticket:
      type: object
      required: [registrationId, eventId, ticketCode, issuedAt]
      properties:
        registrationId:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
        ticketCode:
          type: string
        issuedAt:
          type: string
          format: date-time
    CheckInRequest:
      type: object
      required: [ticketCode]
      properties:
        ticketCode:
          type: string
    CheckInResponse:
      type: object
      required: [status, registrationId, attendeeEmail, checkedInAt]
      properties:
        status:
          type: string
          enum: [NOT_CHECKED_IN, CHECKED_IN]
        registrationId:
          type: string
          format: uuid
        attendeeEmail:
          type: string
          format: email
        checkedInAt:
          type: string
          format: date-time
    Analytics:
      type: object
      required: [capacity, confirmedRegistrations, cancelledRegistrations, availableSeats, checkIns, noShows, registrationTypeBreakdown]
      properties:
        capacity:
          type: integer
        confirmedRegistrations:
          type: integer
        cancelledRegistrations:
          type: integer
        availableSeats:
          type: integer
        checkIns:
          type: integer
        noShows:
          type: integer
        registrationTypeBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/RegistrationTypeBreakdown"
    RegistrationTypeBreakdown:
      type: object
      required: [registrationTypeName, confirmedCount]
      properties:
        registrationTypeName:
          type: string
        confirmedCount:
          type: integer
    SurveySubmissionRequest:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items:
            $ref: "#/components/schemas/SurveyAnswer"
    SurveyAnswer:
      type: object
      required: [questionId]
      properties:
        questionId:
          type: string
          format: uuid
        answerText:
          type: string
          nullable: true
        ratingValue:
          type: integer
          nullable: true
    SurveySubmission:
      type: object
      required: [submissionId, surveyId, eventId, attendeeId, submittedAt, answers]
      properties:
        submissionId:
          type: string
          format: uuid
        surveyId:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
        attendeeId:
          type: string
          format: uuid
        submittedAt:
          type: string
          format: date-time
        answers:
          type: array
          items:
            $ref: "#/components/schemas/SurveyAnswer"
    ApiError:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
        fields:
          type: object
          additionalProperties:
            type: string
