asyncapi: 3.0.0
info:
  title: Qeue Platform Events
  version: 1.0.0
  description: Topic exchange messages used between Qeue services.
x-exchange:
  name: qeue.events
  type: topic
x-queues:
  registration.event-inventory:
    consumes:
      - event.published.v1
      - event.cancelled.v1
    deadLetterQueue: registration.event-inventory.dlq
  notification.registration-events:
    consumes:
      - registration.confirmed.v1
      - registration.cancelled.v1
      - checkin.completed.v1
    deadLetterQueue: notification.registration-events.dlq
channels:
  eventPublished:
    address: event.published.v1
    messages:
      EventPublished:
        $ref: "#/components/messages/EventPublished"
  eventCancelled:
    address: event.cancelled.v1
    messages:
      EventCancelled:
        $ref: "#/components/messages/EventCancelled"
  registrationConfirmed:
    address: registration.confirmed.v1
    messages:
      RegistrationConfirmed:
        $ref: "#/components/messages/RegistrationConfirmed"
  registrationCancelled:
    address: registration.cancelled.v1
    messages:
      RegistrationCancelled:
        $ref: "#/components/messages/RegistrationCancelled"
  checkInCompleted:
    address: checkin.completed.v1
    messages:
      CheckInCompleted:
        $ref: "#/components/messages/CheckInCompleted"
components:
  messages:
    EventPublished:
      name: EventPublished
      payload:
        $ref: "#/components/schemas/EventInventoryMessage"
    EventCancelled:
      name: EventCancelled
      payload:
        $ref: "#/components/schemas/EventInventoryMessage"
    RegistrationConfirmed:
      name: RegistrationConfirmed
      payload:
        $ref: "#/components/schemas/RegistrationNotificationMessage"
    RegistrationCancelled:
      name: RegistrationCancelled
      payload:
        $ref: "#/components/schemas/RegistrationNotificationMessage"
    CheckInCompleted:
      name: CheckInCompleted
      payload:
        $ref: "#/components/schemas/RegistrationNotificationMessage"
  schemas:
    EventInventoryMessage:
      type: object
      required: [eventType, eventId, organizerId, title, startsAt, capacity, status, registrationTypes]
      properties:
        eventType:
          type: string
          enum: [EventPublished, EventCancelled]
        eventId:
          type: string
          format: uuid
        organizerId:
          type: string
          format: uuid
        title:
          type: string
        startsAt:
          type: string
          format: date-time
        venueName:
          type: string
        timezone:
          type: string
        capacity:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [PUBLISHED, CANCELLED]
        registrationTypes:
          type: array
          items:
            $ref: "#/components/schemas/RegistrationTypeProjection"
    RegistrationTypeProjection:
      type: object
      required: [registrationTypeId, name, capacity, active]
      properties:
        registrationTypeId:
          type: string
          format: uuid
        name:
          type: string
        capacity:
          type: integer
        active:
          type: boolean
    RegistrationNotificationMessage:
      type: object
      required: [eventType, registrationId, eventId, eventTitle, attendeeId, attendeeEmail, status, createdAt]
      properties:
        eventType:
          type: string
          enum: [RegistrationConfirmed, RegistrationCancelled, CheckInCompleted]
        registrationId:
          type: string
          format: uuid
        eventId:
          type: string
          format: uuid
        eventTitle:
          type: string
        startsAt:
          type: string
          format: date-time
        venueName:
          type: string
        registrationTypeName:
          type: string
        attendeeId:
          type: string
          format: uuid
        attendeeEmail:
          type: string
          format: email
        status:
          type: string
          enum: [CONFIRMED, CANCELLED]
        createdAt:
          type: string
          format: date-time
        cancelledAt:
          type: string
          format: date-time
