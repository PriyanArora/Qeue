spring.application.name=identity-service

server.port=${IDENTITY_SERVICE_PORT:4001}

spring.datasource.url=${IDENTITY_DB_URL:jdbc:h2:mem:identity_service;MODE=PostgreSQL;DATABASE_TO_UPPER=false}
spring.datasource.username=${IDENTITY_DB_USERNAME:sa}
spring.datasource.password=${IDENTITY_DB_PASSWORD:}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.sql.init.mode=never

identity.jwt.secret=${IDENTITY_JWT_SECRET}
identity.jwt.issuer=${IDENTITY_JWT_ISSUER:qeue-identity}
identity.jwt.expiration-minutes=${IDENTITY_JWT_EXPIRATION_MINUTES:60}

logging.level.root=info
