spring.application.name=event-service

server.port=${EVENT_SERVICE_PORT:4000}

spring.datasource.url=${EVENT_DB_URL:jdbc:h2:mem:event_service;MODE=PostgreSQL;DATABASE_TO_UPPER=false}
spring.datasource.username=${EVENT_DB_USERNAME:sa}
spring.datasource.password=${EVENT_DB_PASSWORD:}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.sql.init.mode=never

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

qeue.rabbitmq.exchange=${RABBITMQ_EXCHANGE:qeue.events}
qeue.rabbitmq.event-published-routing-key=${RABBITMQ_EVENT_PUBLISHED_ROUTING_KEY:event.published.v1}
qeue.rabbitmq.event-cancelled-routing-key=${RABBITMQ_EVENT_CANCELLED_ROUTING_KEY:event.cancelled.v1}
qeue.rabbitmq.publisher-enabled=${EVENT_OUTBOX_PUBLISHER_ENABLED:false}
qeue.rabbitmq.publisher-fixed-delay-ms=${EVENT_OUTBOX_PUBLISHER_FIXED_DELAY_MS:5000}

logging.level.root=info
