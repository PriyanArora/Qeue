spring.application.name=notification-worker

server.port=${NOTIFICATION_WORKER_PORT:4003}

spring.datasource.url=${NOTIFICATION_DB_URL:jdbc:h2:mem:notification_worker;MODE=PostgreSQL;DATABASE_TO_UPPER=false}
spring.datasource.username=${NOTIFICATION_DB_USERNAME:sa}
spring.datasource.password=${NOTIFICATION_DB_PASSWORD:}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.sql.init.mode=never

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.default-requeue-rejected=false

spring.mail.host=${MAILHOG_HOST:localhost}
spring.mail.port=${MAILHOG_PORT:1025}

qeue.rabbitmq.exchange=${RABBITMQ_EXCHANGE:qeue.events}
qeue.rabbitmq.registration-confirmed-routing-key=${RABBITMQ_REGISTRATION_CONFIRMED_ROUTING_KEY:registration.confirmed.v1}
qeue.rabbitmq.registration-cancelled-routing-key=${RABBITMQ_REGISTRATION_CANCELLED_ROUTING_KEY:registration.cancelled.v1}
qeue.rabbitmq.check-in-completed-routing-key=${RABBITMQ_CHECK_IN_COMPLETED_ROUTING_KEY:checkin.completed.v1}
qeue.rabbitmq.notification-queue=${RABBITMQ_NOTIFICATION_QUEUE:notification.registration-events}
qeue.rabbitmq.notification-dead-letter-exchange=${RABBITMQ_NOTIFICATION_DLX:qeue.notifications.dlx}
qeue.rabbitmq.notification-dead-letter-queue=${RABBITMQ_NOTIFICATION_DLQ:notification.registration-events.dlq}
qeue.rabbitmq.notification-dead-letter-routing-key=${RABBITMQ_NOTIFICATION_DLQ_ROUTING_KEY:notification.registration-events.failed}
qeue.rabbitmq.listener-enabled=${RABBITMQ_LISTENER_ENABLED:false}

qeue.notification.mailhog-enabled=${MAILHOG_ENABLED:false}
qeue.notification.mailhog-host=${MAILHOG_HOST:localhost}
qeue.notification.mailhog-port=${MAILHOG_PORT:1025}

logging.level.root=info
