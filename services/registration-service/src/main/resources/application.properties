spring.application.name=registration-service

server.port=${REGISTRATION_SERVICE_PORT:4002}
grpc.server.port=${REGISTRATION_GRPC_PORT:9001}

spring.datasource.url=${REGISTRATION_DB_URL:jdbc:h2:mem:registration_service;MODE=PostgreSQL;DATABASE_TO_UPPER=false}
spring.datasource.username=${REGISTRATION_DB_USERNAME:sa}
spring.datasource.password=${REGISTRATION_DB_PASSWORD:}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.sql.init.mode=never

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.default-requeue-rejected=false

qeue.rabbitmq.exchange=${RABBITMQ_EXCHANGE:qeue.events}
qeue.rabbitmq.event-published-routing-key=${RABBITMQ_EVENT_PUBLISHED_ROUTING_KEY:event.published.v1}
qeue.rabbitmq.event-cancelled-routing-key=${RABBITMQ_EVENT_CANCELLED_ROUTING_KEY:event.cancelled.v1}
qeue.rabbitmq.registration-confirmed-routing-key=${RABBITMQ_REGISTRATION_CONFIRMED_ROUTING_KEY:registration.confirmed.v1}
qeue.rabbitmq.registration-cancelled-routing-key=${RABBITMQ_REGISTRATION_CANCELLED_ROUTING_KEY:registration.cancelled.v1}
qeue.rabbitmq.check-in-completed-routing-key=${RABBITMQ_CHECK_IN_COMPLETED_ROUTING_KEY:checkin.completed.v1}
qeue.rabbitmq.inventory-queue=${RABBITMQ_INVENTORY_QUEUE:registration.event-inventory}
qeue.rabbitmq.inventory-dead-letter-exchange=${RABBITMQ_INVENTORY_DLX:qeue.events.dlx}
qeue.rabbitmq.inventory-dead-letter-queue=${RABBITMQ_INVENTORY_DLQ:registration.event-inventory.dlq}
qeue.rabbitmq.inventory-dead-letter-routing-key=${RABBITMQ_INVENTORY_DLQ_ROUTING_KEY:registration.event-inventory.failed}
qeue.rabbitmq.listener-enabled=${RABBITMQ_LISTENER_ENABLED:false}
qeue.rabbitmq.publisher-enabled=${REGISTRATION_OUTBOX_PUBLISHER_ENABLED:false}
qeue.rabbitmq.publisher-fixed-delay-ms=${REGISTRATION_OUTBOX_PUBLISHER_FIXED_DELAY_MS:5000}
